{% extends "base.html" %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h2>🔐 Đăng nhập</h2>
        
        {% if error %}
        <div class="alert error">{{ error }}</div>
        {% endif %}
        
        {% if message %}
        <div class="alert success">{{ message }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" required placeholder="Nhập username">
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required placeholder="Nhập password">
            </div>
            
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
        </form>

        <p style="text-align:center; margin-top: 1rem;">
            Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
        </p>
        
        <p class="login-hint">👤 Admin: admin / admin123</p>
    </div>
</div>
{% endblock %}
