<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Employee Management{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">🏢 Employee Management</a>
            {% if session.get('user_id') %}
            <div class="nav-menu">
                <a href="/dashboard">Dashboard</a>
                <a href="/attendance">Điểm danh</a>
                <a href="/leave">Nghỉ phép</a>
                <a href="/salary">Lương thưởng</a>

                {% if session.get('username') == 'admin' %}
                <div class="nav-dropdown">
                    <a href="/admin/users">👥 Quản lý user</a>
                </div>
                {% endif %}

                <a href="/logout" class="nav-logout">Đăng xuất</a>
            </div>
            {% endif %}
        </div>
    </nav>
    
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
